services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace
    command: sh /workspace/scripts/docker-start-web.sh
    env_file:
      - .env.local
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      - next_cache:/workspace/.next
    depends_on:
      - convex-dev

  convex-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace
    command: sh /workspace/scripts/docker-start-convex.sh
    env_file:
      - .env.local
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules

volumes:
  node_modules:
  next_cache:
