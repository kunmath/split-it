<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Split-It | Editorial Ledger Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-primary": "#006c49",
                        "tertiary": "#68dba9",
                        "on-surface": "#e5e2e1",
                        "on-primary": "#003824",
                        "tertiary-fixed-dim": "#68dba9",
                        "on-tertiary-container": "#00422c",
                        "surface-container-lowest": "#0e0e0e",
                        "on-primary-fixed": "#002113",
                        "surface-container-high": "#2a2a2a",
                        "secondary-fixed": "#ffdbd0",
                        "on-background": "#e5e2e1",
                        "primary-fixed-dim": "#4edea3",
                        "on-error-container": "#ffdad6",
                        "primary-container": "#10b981",
                        "background": "#131313",
                        "on-tertiary-fixed": "#002114",
                        "tertiary-fixed": "#85f8c4",
                        "on-primary-fixed-variant": "#005236",
                        "on-secondary-container": "#ff9b7c",
                        "surface-container-highest": "#353534",
                        "secondary-container": "#7f2a0d",
                        "inverse-surface": "#e5e2e1",
                        "surface-container-low": "#1c1b1b",
                        "surface-tint": "#4edea3",
                        "surface-container": "#201f1f",
                        "outline": "#86948a",
                        "surface-bright": "#393939",
                        "error": "#ffb4ab",
                        "primary": "#4edea3",
                        "on-primary-container": "#00422b",
                        "primary-fixed": "#6ffbbe",
                        "on-secondary": "#5e1700",
                        "secondary": "#ffb59e",
                        "surface": "#131313",
                        "on-secondary-fixed": "#3a0b00",
                        "error-container": "#93000a",
                        "outline-variant": "#3c4a42",
                        "on-surface-variant": "#bbcabf",
                        "surface-dim": "#131313",
                        "tertiary-container": "#3eb686",
                        "on-tertiary": "#003825",
                        "on-secondary-fixed-variant": "#7f2a0d",
                        "surface-variant": "#353534",
                        "secondary-fixed-dim": "#ffb59e",
                        "inverse-on-surface": "#313030",
                        "on-tertiary-fixed-variant": "#005137",
                        "on-error": "#690005"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #131313;
            color: #e5e2e1;
            font-family: 'Inter', sans-serif;
        }
        .editorial-gradient {
            background: linear-gradient(135deg, #4edea3 0%, #10b981 100%);
        }
        .glass-panel {
            background: rgba(28, 27, 27, 0.8);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
<!-- Background Decoration for Editorial Feel -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute top-[60%] -right-[10%] w-[50%] h-[50%] bg-secondary/5 rounded-full blur-[120px]"></div>
</div>
<!-- Main Authentication Canvas -->
<main class="relative w-full max-w-[480px] z-10">
<!-- Brand Identity Header -->
<div class="flex flex-col items-center mb-12">
<div class="text-[#4edea3] font-black text-3xl tracking-tighter font-headline mb-2">Split-It</div>
<div class="w-12 h-[2px] bg-primary-container opacity-40"></div>
</div>
<!-- Auth Card -->
<div class="surface-container-low rounded-[2rem] p-10 shadow-2xl ring-1 ring-white/5">
<!-- Welcome Typography -->
<header class="mb-10 text-center">
<h1 class="font-headline font-extrabold text-4xl tracking-tight text-on-surface mb-3">Welcome back</h1>
<p class="font-body text-on-surface-variant text-sm tracking-wide">Access your editorial ledger</p>
</header>
<!-- Social Action -->
<button class="group w-full flex items-center justify-center gap-3 py-4 px-6 bg-surface-container-high hover:bg-surface-bright transition-all duration-300 rounded-xl font-headline font-semibold text-on-surface border border-outline-variant/20 active:scale-[0.98]">
<svg fill="none" height="20" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Continue with Google
            </button>
<!-- Semantic Divider -->
<div class="relative my-10 flex items-center">
<div class="flex-grow h-px bg-outline-variant opacity-20"></div>
<span class="px-4 font-headline font-bold text-[10px] tracking-[0.2em] text-on-surface-variant">OR EMAIL</span>
<div class="flex-grow h-px bg-outline-variant opacity-20"></div>
</div>
<!-- Credentials Form -->
<form class="space-y-6">
<div class="space-y-2">
<label class="font-label text-xs font-semibold text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none rounded-xl py-4 px-5 text-on-surface placeholder:text-on-surface-variant/30 focus:ring-2 focus:ring-primary/40 transition-all font-body" id="email" placeholder="ledger@split-it.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label text-xs font-semibold text-on-surface-variant" for="password">Password</label>
<a class="text-[10px] font-bold text-primary hover:text-tertiary transition-colors uppercase tracking-wider" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none rounded-xl py-4 px-5 text-on-surface placeholder:text-on-surface-variant/30 focus:ring-2 focus:ring-primary/40 transition-all font-body" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="pt-4">
<button class="w-full editorial-gradient py-5 rounded-2xl font-headline font-extrabold text-on-primary text-lg tracking-tight shadow-xl shadow-primary/10 active:scale-[0.97] transition-all flex items-center justify-center gap-2" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'wght' 700;">arrow_forward</span>
</button>
</div>
</form>
<!-- Secondary Action -->
<footer class="mt-10 text-center">
<p class="font-body text-on-surface-variant text-sm">
                    New to the collective? 
                    <a class="font-headline font-bold text-primary hover:underline underline-offset-4 ml-1" href="#">Create access</a>
</p>
</footer>
</div>
<!-- System Meta Info -->
<div class="mt-8 flex justify-between items-center px-6">
<div class="flex gap-4">
<span class="text-[10px] font-medium text-on-surface-variant/40 hover:text-on-surface-variant cursor-pointer transition-colors">Privacy</span>
<span class="text-[10px] font-medium text-on-surface-variant/40 hover:text-on-surface-variant cursor-pointer transition-colors">Terms</span>
</div>
<div class="flex items-center gap-1 opacity-20">
<span class="material-symbols-outlined text-[12px]">verified_user</span>
<span class="text-[10px] font-bold tracking-widest uppercase">Secured</span>
</div>
</div>
</main>
<!-- Side Content Area (Visual Balance) -->
<div class="hidden xl:flex fixed right-12 bottom-12 flex-col items-end gap-2 max-w-xs text-right">
<span class="font-headline font-black text-6xl opacity-5 select-none leading-none">SPLIT-IT</span>
<p class="font-body text-xs text-on-surface-variant/30 leading-relaxed">
            Personal debt and shared expenses <br/>treated with the visual gravity <br/>of a premium lifestyle brand.
        </p>
</div>
</body></html>
